name: KiCad Validate

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: kicad-validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  KICAD_IMAGE: ghcr.io/kicad/kicad:10.0.4
  SCH: pcb-psu-led.kicad_sch
  SYM: pcb-psu-led.kicad_sym
  FP_LIB: PSU_LED.pretty
  FP_NAME: Talema_70000K

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Inventory
        shell: bash
        run: |
          set -euo pipefail
          find . -path ./.git -prune -o -type f \
            -printf '%10s  %p\n' | sort -k2

      - name: Stage writable copy
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$RUNNER_TEMP/ci"
          mkdir -p \
            "$RUNNER_TEMP/ci/src" \
            "$RUNNER_TEMP/ci/home/.config" \
            "$RUNNER_TEMP/ci/home/.cache/fontconfig" \
            "$RUNNER_TEMP/ci/out/symbol" \
            "$RUNNER_TEMP/ci/out/footprint"

          cp -a "$GITHUB_WORKSPACE/." "$RUNNER_TEMP/ci/src/"
          rm -rf "$RUNNER_TEMP/ci/src/.git"

      - name: KiCad validation
        shell: bash
        run: |
          set +e

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/home/kicad \
            -e KICAD_CONFIG_HOME=/home/kicad/.config/kicad \
            -e XDG_CONFIG_HOME=/home/kicad/.config \
            -e XDG_CACHE_HOME=/home/kicad/.cache \
            -e SCH \
            -e SYM \
            -e FP_LIB \
            -e FP_NAME \
            -v "$RUNNER_TEMP/ci/home:/home/kicad" \
            -v "$RUNNER_TEMP/ci/src:/work" \
            -v "$RUNNER_TEMP/ci/out:/out" \
            -w /work \
            "$KICAD_IMAGE" \
            sh -lc '
              set -u

              for file in \
                "$SCH" \
                "$SYM" \
                "$FP_LIB/$FP_NAME.kicad_mod" \
                pcb-psu-led.kicad_pro \
                sym-lib-table \
                fp-lib-table
              do
                if [ ! -s "$file" ]; then
                  echo "MISSING OR EMPTY: $file"
                  exit 90
                fi

                printf "OK %10s bytes  %s\n" \
                  "$(wc -c < "$file")" "$file"
              done

              kicad-cli version || exit 91

              mkdir -p /out/symbol /out/footprint

              kicad-cli sym export svg \
                --symbol "$FP_NAME" \
                --black-and-white \
                --output /out/symbol \
                "$SYM" || exit 92

              if [ "$(find /out/symbol -type f -name "*.svg" \
                -size +0c | wc -l)" -lt 1 ]; then
                echo "Symbol export produced no non-empty SVG."
                exit 92
              fi

              find /out/symbol -type f -name "*.svg" \
                -printf "SYMBOL SVG %s bytes  %p\n"

              kicad-cli fp export svg \
                --footprint "$FP_NAME" \
                --black-and-white \
                --output /out/footprint \
                "$FP_LIB" || exit 93

              if [ "$(find /out/footprint -type f -name "*.svg" \
                -size +0c | wc -l)" -lt 1 ]; then
                echo "Footprint export produced no non-empty SVG."
                exit 93
              fi

              find /out/footprint -type f -name "*.svg" \
                -printf "FOOTPRINT SVG %s bytes  %p\n"

              kicad-cli sch export netlist \
                --format kicadsexpr \
                --output /out/netlist.net \
                "$SCH" || exit 94

              if [ ! -s /out/netlist.net ]; then
                echo "Schematic parser produced no non-empty netlist."
                exit 94
              fi

              kicad-cli sch erc \
                --format report \
                --units mm \
                --severity-all \
                --exit-code-violations \
                --output /out/erc.rpt \
                "$SCH"
              rc=$?

              if [ ! -s /out/erc.rpt ]; then
                echo "ERC report was not generated."
                exit 95
              fi

              cat /out/erc.rpt
              exit "$rc"
            ' 2>&1 | tee "$RUNNER_TEMP/ci/out/run.log"

          status=${PIPESTATUS[0]}
          set -e

          case "$status" in
            0)
              echo "PASS: symbol, footprint, schematic parser and ERC."
              ;;
            5)
              echo "::error::ERC violations found; see erc.rpt."
              ;;
            90)
              echo "::error::Missing or empty project input."
              ;;
            91)
              echo "::error::kicad-cli is not runnable in the selected image."
              ;;
            92)
              echo "::error::Symbol library parse or SVG export failed."
              ;;
            93)
              echo "::error::Footprint library parse or SVG export failed."
              ;;
            94)
              echo "::error::Schematic parse or netlist export failed."
              ;;
            95)
              echo "::error::ERC produced no report."
              ;;
            125)
              echo "::error::Docker could not start the KiCad container."
              ;;
            *)
              echo "::error::Unexpected validation exit code: $status."
              ;;
          esac

          exit "$status"

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: kicad-validation-${{ github.run_number }}
          path: ${{ runner.temp }}/ci/out
          if-no-files-found: error
          retention-days: 14
