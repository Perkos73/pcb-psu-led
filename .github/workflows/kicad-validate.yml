name: KiCad Validate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show KiCad version
        run: |
          docker run --rm \
            ghcr.io/kicad/kicad:10.0.4 \
            kicad-cli version

      - name: Check schematic syntax
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ghcr.io/kicad/kicad:10.0.4 \
            kicad-cli sch export pdf \
            --output pcb-psu-led-schematic.pdf \
            pcb-psu-led.kicad_sch

      - name: Run schematic ERC
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ghcr.io/kicad/kicad:10.0.4 \
            kicad-cli sch erc \
            --output erc.rpt \
            --exit-code-violations \
            pcb-psu-led.kicad_sch

      - name: Show ERC report
        if: always()
        run: |
          if [ -f erc.rpt ]; then
            cat erc.rpt
          else
            echo "ERC report was not generated."
          fi
