name: KiCad Validate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show KiCad version
        run: |
          docker run --rm \
            ghcr.io/kicad/kicad:10.0.4 \
            kicad-cli version

            - name: Validate schematic file
        run: |
          set -o pipefail

          echo "=== Repository files ==="
          ls -la

          echo "=== Schematic content ==="
          cat pcb-psu-led.kicad_sch

          echo "=== KiCad PDF export ==="
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ghcr.io/kicad/kicad:10.0.4 \
            kicad-cli sch export pdf \
            --output pcb-psu-led-schematic.pdf \
            pcb-psu-led.kicad_sch \
            2>&1 | tee kicad-validation.log

          echo "=== Generated files ==="
          ls -la
