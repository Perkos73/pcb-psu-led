name: KiCad Validate

on:
  push:
    branches:
      - pcb2
  workflow_dispatch:

concurrency:
  group: kicad-validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  KICAD_IMAGE: ghcr.io/kicad/kicad:10.0-full
  KICAD_EXPECTED: "10.0."
  SCH: pcb-psu-led.kicad_sch
  SYM: pcb-psu-led.kicad_sym
  PCB: pcb-psu-led.kicad_pcb
  FP_LIB: PSU_LED.pretty
  FP_NAME: Talema_70000K

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Inventory
        shell: bash
        run: |
          set -euo pipefail
          find . -path ./.git -prune -o -type f \
            -printf '%10s  %p\n' | sort -k2

      - name: Stage writable copy
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$RUNNER_TEMP/ci"
          mkdir -p \
            "$RUNNER_TEMP/ci/src" \
            "$RUNNER_TEMP/ci/home/.config" \
            "$RUNNER_TEMP/ci/home/.cache/fontconfig" \
            "$RUNNER_TEMP/ci/out/symbol" \
            "$RUNNER_TEMP/ci/out/footprint" \
            "$RUNNER_TEMP/ci/out/board/front" \
            "$RUNNER_TEMP/ci/out/board/back"

          cp -a "$GITHUB_WORKSPACE/." "$RUNNER_TEMP/ci/src/"
          rm -rf "$RUNNER_TEMP/ci/src/.git"

      - name: Resolve and verify KiCad image
        shell: bash
        run: |
          set -euo pipefail

          if ! docker pull "$KICAD_IMAGE"; then
            echo "::error::Image tag not published or unavailable: $KICAD_IMAGE"
            exit 125
          fi

          version="$(
            docker run --rm \
              "$KICAD_IMAGE" \
              kicad-cli version 2>&1 | tr -d '\r'
          )"

          echo "kicad-cli version: $version"
          printf '%s\n' "$version" \
            > "$RUNNER_TEMP/ci/out/kicad-version.txt"

          case "$version" in
            "$KICAD_EXPECTED"*)
              echo "KiCad image is within the frozen 10.0 series."
              ;;
            *)
              echo "::error::Expected KiCad series ${KICAD_EXPECTED}x, image reports: $version"
              exit 96
              ;;
          esac

      - name: KiCad validation
        id: kicad_validation
        shell: bash
        run: |
          set +e

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/home/kicad \
            -e KICAD_CONFIG_HOME=/home/kicad/.config/kicad \
            -e XDG_CONFIG_HOME=/home/kicad/.config \
            -e XDG_CACHE_HOME=/home/kicad/.cache \
            -e SCH \
            -e SYM \
            -e PCB \
            -e FP_LIB \
            -e FP_NAME \
            -v "$RUNNER_TEMP/ci/home:/home/kicad" \
            -v "$RUNNER_TEMP/ci/src:/work" \
            -v "$RUNNER_TEMP/ci/out:/out" \
            -w /work \
            "$KICAD_IMAGE" \
            bash -lc '
              set -u

              for file in \
                "$SCH" \
                "$SYM" \
                "$PCB" \
                "$FP_LIB/$FP_NAME.kicad_mod" \
                pcb-psu-led.kicad_pro \
                sym-lib-table \
                fp-lib-table
              do
                if [ ! -s "$file" ]; then
                  echo "MISSING OR EMPTY: $file"
                  exit 90
                fi

                printf "OK %10s bytes  %s\n" \
                  "$(wc -c < "$file")" "$file"
              done

              kicad-cli version || exit 91

              mkdir -p /out/symbol /out/footprint

              kicad-cli sym export svg \
                --symbol "$FP_NAME" \
                --black-and-white \
                --output /out/symbol \
                "$SYM" || exit 92

              if [ "$(
                find /out/symbol \
                  -type f \
                  -name "*.svg" \
                  -size +0c | wc -l
              )" -lt 1 ]; then
                echo "Symbol export produced no non-empty SVG."
                exit 92
              fi

              find /out/symbol \
                -type f \
                -name "*.svg" \
                -printf "SYMBOL SVG %s bytes  %p\n"

              kicad-cli fp export svg \
                --footprint "$FP_NAME" \
                --black-and-white \
                --output /out/footprint \
                "$FP_LIB" || exit 93

              if [ "$(
                find /out/footprint \
                  -type f \
                  -name "*.svg" \
                  -size +0c | wc -l
              )" -lt 1 ]; then
                echo "Footprint export produced no non-empty SVG."
                exit 93
              fi

              find /out/footprint \
                -type f \
                -name "*.svg" \
                -printf "FOOTPRINT SVG %s bytes  %p\n"

              kicad-cli sch export netlist \
                --format kicadsexpr \
                --output /out/netlist.net \
                "$SCH" || exit 94

              if [ ! -s /out/netlist.net ]; then
                echo "Schematic parser produced no non-empty netlist."
                exit 94
              fi

              kicad-cli pcb export stats \
                --format report \
                --units mm \
                --output /out/pcb-stats.rpt \
                "$PCB" || exit 97

              if [ ! -s /out/pcb-stats.rpt ]; then
                echo "PCB parser produced no non-empty statistics report."
                exit 97
              fi

              echo "--- PCB placement statistics ---"
              cat /out/pcb-stats.rpt

              if ! kicad-cli pcb drc \
                --format report \
                --units mm \
                --severity-all \
                --schematic-parity \
                --output /out/drc-full.rpt \
                "$PCB"
              then
                echo "Full PCB DRC report command failed."
                exit 98
              fi

              if [ ! -s /out/drc-full.rpt ]; then
                echo "Full PCB DRC report was not generated."
                exit 98
              fi

              echo "--- PCB DRC baseline: all severities, non-gating before routing ---"
              cat /out/drc-full.rpt

              kicad-cli pcb export svg \
                --output /out/board/front \
                --layers F.Cu,F.Mask,F.Silkscreen,F.Fab \
                --common-layers Edge.Cuts \
                --black-and-white \
                --fit-page-to-board \
                --exclude-drawing-sheet \
                --mode-single \
                "$PCB" || exit 99

              if [ "$(
                find /out/board/front \
                  -type f \
                  -name "*.svg" \
                  -size +0c | wc -l
              )" -lt 1 ]; then
                echo "Front board preview produced no non-empty SVG."
                exit 99
              fi

              kicad-cli pcb export svg \
                --output /out/board/back \
                --layers B.Cu,B.Mask,B.Silkscreen,B.Fab \
                --common-layers Edge.Cuts \
                --black-and-white \
                --mirror \
                --fit-page-to-board \
                --exclude-drawing-sheet \
                --mode-single \
                "$PCB" || exit 99

              if [ "$(
                find /out/board/back \
                  -type f \
                  -name "*.svg" \
                  -size +0c | wc -l
              )" -lt 1 ]; then
                echo "Back board preview produced no non-empty SVG."
                exit 99
              fi

              echo "--- Board preview files ---"
              find /out/board \
                -type f \
                -name "*.svg" \
                -printf "%s bytes  %p\n" \
                | sort

              if ! kicad-cli sch erc \
                --format report \
                --units mm \
                --severity-all \
                --output /out/erc-full.rpt \
                "$SCH"
              then
                echo "Full ERC report command failed."
                exit 95
              fi

              if [ ! -s /out/erc-full.rpt ]; then
                echo "Full ERC report was not generated."
                exit 95
              fi

              echo "--- ERC full report: all severities ---"
              cat /out/erc-full.rpt

              set +e
              kicad-cli sch erc \
                --format report \
                --units mm \
                --severity-error \
                --exit-code-violations \
                --output /out/erc.rpt \
                "$SCH"
              rc=$?
              set -e

              if [ ! -s /out/erc.rpt ]; then
                echo "ERC gating report was not generated."
                exit 95
              fi

              echo "--- ERC gating report: errors only ---"
              cat /out/erc.rpt

              exit "$rc"
            ' 2>&1 | tee "$RUNNER_TEMP/ci/out/run.log"

          status=${PIPESTATUS[0]}
          set -e

          printf '%s\n' "$status" \
            > "$RUNNER_TEMP/ci/out/exit-status.txt"

          tail_msg="$(
            tail -n 25 "$RUNNER_TEMP/ci/out/run.log" \
              | tr '\n' '|' \
              | cut -c1-800
          )"

          if [ -z "$tail_msg" ]; then
            tail_msg="(container produced no output)"
          fi

          case "$status" in
            0)
              echo "PASS: symbol, footprint, schematic, PCB parser, DRC baseline, board previews and error-level ERC."
              ;;
            5)
              echo "::error::ERC errors found (exit 5) :: $tail_msg"
              ;;
            90)
              echo "::error::Missing or empty project input (exit 90) :: $tail_msg"
              ;;
            91)
              echo "::error::kicad-cli not runnable (exit 91) :: $tail_msg"
              ;;
            92)
              echo "::error::Symbol library parse/export failed (exit 92) :: $tail_msg"
              ;;
            93)
              echo "::error::Footprint library parse/export failed (exit 93) :: $tail_msg"
              ;;
            94)
              echo "::error::Schematic parser/netlist export failed (exit 94) :: $tail_msg"
              ;;
            95)
              echo "::error::ERC report generation failed (exit 95) :: $tail_msg"
              ;;
            96)
              echo "::error::Unexpected KiCad version series (exit 96) :: $tail_msg"
              ;;
            97)
              echo "::error::PCB parser/statistics export failed (exit 97) :: $tail_msg"
              ;;
            98)
              echo "::error::PCB DRC report generation failed (exit 98) :: $tail_msg"
              ;;
            99)
              echo "::error::PCB preview SVG export failed (exit 99) :: $tail_msg"
              ;;
            125)
              echo "::error::Docker could not start the container (exit 125) :: $tail_msg"
              ;;
            *)
              echo "::error::Unexpected validation exit $status :: $tail_msg"
              ;;
          esac

          exit "$status"

      - name: Publish validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "# KiCad validation"
            echo

            if [ -s "$RUNNER_TEMP/ci/out/kicad-version.txt" ]; then
              echo "**KiCad:** \`$(cat "$RUNNER_TEMP/ci/out/kicad-version.txt")\`"
            else
              echo "**KiCad:** version unavailable"
            fi

            if [ -s "$RUNNER_TEMP/ci/out/exit-status.txt" ]; then
              echo
              echo "**Validation exit code:** \`$(cat "$RUNNER_TEMP/ci/out/exit-status.txt")\`"
            fi

            echo
            echo "## PCB placement statistics"
            echo
            echo '```text'
            if [ -s "$RUNNER_TEMP/ci/out/pcb-stats.rpt" ]; then
              cat "$RUNNER_TEMP/ci/out/pcb-stats.rpt"
            else
              echo "PCB statistics report was not generated."
            fi
            echo '```'

            echo
            echo "## PCB DRC baseline — all severities"
            echo
            echo "**Informational, non-gating before routing.**"
            echo
            echo '```text'
            if [ -s "$RUNNER_TEMP/ci/out/drc-full.rpt" ]; then
              cat "$RUNNER_TEMP/ci/out/drc-full.rpt"
            else
              echo "PCB DRC report was not generated."
            fi
            echo '```'

            echo
            echo "## Board preview files"
            echo
            echo '```text'
            if find "$RUNNER_TEMP/ci/out/board" \
              -type f \
              -name "*.svg" \
              -size +0c \
              -print -quit 2>/dev/null | grep -q .
            then
              find "$RUNNER_TEMP/ci/out/board" \
                -type f \
                -name "*.svg" \
                -printf "%s bytes  %P\n" \
                | sort
            else
              echo "Board preview SVG files were not generated."
            fi
            echo '```'

            echo
            echo "## ERC gating report — errors only"
            echo
            echo '```text'
            if [ -s "$RUNNER_TEMP/ci/out/erc.rpt" ]; then
              cat "$RUNNER_TEMP/ci/out/erc.rpt"
            else
              echo "ERC gating report was not generated."
            fi
            echo '```'

            echo
            echo "<details>"
            echo "<summary>Full ERC report — all severities</summary>"
            echo
            echo '```text'
            if [ -s "$RUNNER_TEMP/ci/out/erc-full.rpt" ]; then
              cat "$RUNNER_TEMP/ci/out/erc-full.rpt"
            else
              echo "Full ERC report was not generated."
            fi
            echo '```'
            echo "</details>"

            echo
            echo "<details>"
            echo "<summary>Validation log tail</summary>"
            echo
            echo '```text'
            if [ -s "$RUNNER_TEMP/ci/out/run.log" ]; then
              tail -n 50 "$RUNNER_TEMP/ci/out/run.log"
            else
              echo "Validation log was not generated."
            fi
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kicad-validation-${{ github.run_number }}
          path: ${{ runner.temp }}/ci/out
          if-no-files-found: error
          retention-days: 14
