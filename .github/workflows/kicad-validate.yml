name: KiCad Validate

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: kicad-validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  KICAD_IMAGE: ghcr.io/kicad/kicad:10.0-full
  KICAD_EXPECTED: "10.0."
  SCH: pcb-psu-led.kicad_sch
  SYM: pcb-psu-led.kicad_sym
  FP_LIB: PSU_LED.pretty
  FP_NAME: Talema_70000K

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Inventory
        shell: bash
        run: |
          set -euo pipefail
          find . -path ./.git -prune -o -type f \
            -printf '%10s  %p\n' | sort -k2

      - name: Stage writable copy
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$RUNNER_TEMP/ci"
          mkdir -p \
            "$RUNNER_TEMP/ci/src" \
            "$RUNNER_TEMP/ci/home/.config" \
            "$RUNNER_TEMP/ci/home/.cache/fontconfig" \
            "$RUNNER_TEMP/ci/out/symbol" \
            "$RUNNER_TEMP/ci/out/footprint"

          cp -a "$GITHUB_WORKSPACE/." "$RUNNER_TEMP/ci/src/"
          rm -rf "$RUNNER_TEMP/ci/src/.git"

      - name: Resolve and verify KiCad image
        shell: bash
        run: |
          set -euo pipefail

          if ! docker pull "$KICAD_IMAGE"; then
            echo "::error::Image tag not published or unavailable: $KICAD_IMAGE"
            exit 125
          fi

          version="$(
            docker run --rm \
              "$KICAD_IMAGE" \
              kicad-cli version 2>&1 | tr -d '\r'
          )"

          echo "kicad-cli version: $version"
          printf '%s\n' "$version" \
            > "$RUNNER_TEMP/ci/out/kicad-version.txt"

          case "$version" in
            "$KICAD_EXPECTED"*)
              echo "KiCad image is within the frozen 10.0 series."
              ;;
            *)
              echo "::error::Expected KiCad series ${KICAD_EXPECTED}x, image reports: $version"
              exit 96
              ;;
          esac

      - name: KiCad validation
        id: kicad_validation
        shell: bash
        run: |
          set +e

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/home/kicad \
            -e KICAD_CONFIG_HOME=/home/kicad/.config/kicad \
            -e XDG_CONFIG_HOME=/home/kicad/.config \
            -e XDG_CACHE_HOME=/home/kicad/.cache \
            -e SCH \
            -e SYM \
            -e FP_LIB \
            -e FP_NAME \
            -v "$RUNNER_TEMP/ci/home:/home/kicad" \
            -v "$RUNNER_TEMP/ci/src:/work" \
            -v "$RUNNER_TEMP/ci/out:/out" \
            -w /work \
            "$KICAD_IMAGE" \
            bash -lc '
              set -u

              for file in \
                "$SCH" \
                "$SYM" \
                "$FP_LIB/$FP_NAME.kicad_mod" \
                pcb-psu-led.kicad_pro \
                sym-lib-table \
                fp-lib-table
              do
                if [ ! -s "$file" ]; then
                  echo "MISSING OR EMPTY: $file"
                  exit 90
                fi

                printf "OK %10s bytes  %s\n" \
                  "$(wc -c < "$file")" "$file"
              done

              kicad-cli version || exit 91

              mkdir -p /out/symbol /out/footprint

              kicad-cli sym export svg \
                --symbol "$FP_NAME" \
                --black-and-white \
                --output /out/symbol \
                "$SYM" || exit 92

              if [ "$(
                find /out/symbol \
                  -type f \
                  -name "*.svg" \
                  -size +0c | wc -l
              )" -lt 1 ]; then
                echo "Symbol export produced no non-empty SVG."
                exit 92
              fi

              find /out/symbol \
                -type f \
                -name "*.svg" \
                -printf "SYMBOL SVG %s bytes  %p\n"

              kicad-cli fp export svg \
                --footprint "$FP_NAME" \
                --black-and-white \
                --output /out/footprint \
                "$FP_LIB" || exit 93

              if [ "$(
                find /out/footprint \
                  -type f \
                  -name "*.svg" \
                  -size +0c | wc -l
              )" -lt 1 ]; then
                echo "Footprint export produced no non-empty SVG."
                exit 93
              fi

              find /out/footprint \
                -type f \
                -name "*.svg" \
                -printf "FOOTPRINT SVG %s bytes  %p\n"

              kicad-cli sch export netlist \
                --format kicadsexpr \
                --output /out/netlist.net \
                "$SCH" || exit 94

              if [ ! -s /out/netlist.net ]; then
                echo "Schematic parser produced no non-empty netlist."
                exit 94
              fi

              if ! kicad-cli sch erc \
                --format report \
                --units mm \
                --severity-all \
                --output /out/erc-full.rpt \
                "$SCH"
              then
                echo "Full ERC report command failed."
                exit 95
              fi

              if [ ! -s /out/erc-full.rpt ]; then
                echo "Full ERC report was not generated."
                exit 95
              fi

              echo "--- ERC full report: all severities ---"
              cat /out/erc-full.rpt

              set +e
              kicad-cli sch erc \
                --format report \
                --units mm \
                --severity-error \
                --exit-code-violations \
                --output /out/erc.rpt \
                "$SCH"
              rc=$?
              set -e

              if [ ! -s /out/erc.rpt ]; then
                echo "ERC gating report was not generated."
                exit 95
              fi

              echo "--- ERC gating report: errors only ---"
              cat /out/erc.rpt

              exit "$rc"
            ' 2>&1 | tee "$RUNNER_TEMP/ci/out/run.log"

          status=${PIPESTATUS[0]}
          set -e

          printf '%s\n' "$status" \
            > "$RUNNER_TEMP/ci/out/exit-status.txt"

          tail_msg="$(
            tail -n 25 "$RUNNER_TEMP/ci/out/run.log" \
              | tr '\n' '|' \
              | cut -c1-800
          )"

          if [ -z "$tail_msg" ]; then
            tail_msg="(container produced no output)"
          fi

          case "$status" in
            0)
              echo "PASS: symbol, footprint, schematic parser and error-level ERC."
              ;;
            5)
              echo "::error::ERC errors found (exit 5) :: $tail_msg"
              ;;
            90)
              echo "::error::Missing or empty project input (exit 90) :: $tail_msg"
              ;;
            91)
              echo "::error::kicad-cli not runnable (exit 91) :: $tail_msg"
              ;;
            92)
              echo "::error::Symbol library parse/export failed (exit 92) :: $tail_msg"
              ;;
            93)
              echo "::error::Footprint library parse/export failed (exit 93) :: $tail_msg"
              ;;
            94)
              echo "::error::Schematic parser/netlist export failed (exit 94) :: $tail_msg"
              ;;
            95)
              echo "::error::ERC report generation failed (exit 95) :: $tail_msg"
              ;;
            96)
              echo "::error::Unexpected KiCad version series (exit 96) :: $tail_msg"
              ;;
            125)
              echo "::error::Docker could not start the container (exit 125) :: $tail_msg"
              ;;
            *)
              echo "::error::Unexpected validation exit $status :: $tail_msg"
              ;;
          esac

          exit "$status"

      - name: Parse-normalization probe
        if: always()
        shell: bash
        run: |
          set +e

          probe_root="$RUNNER_TEMP/ci/out/normalization-probe"
          rm -rf "$probe_root"
          mkdir -p \
            "$probe_root/original" \
            "$probe_root/normalized"

          if [ ! -s "$RUNNER_TEMP/ci/src/$SYM" ] || \
             [ ! -s "$RUNNER_TEMP/ci/src/$SCH" ]; then
            {
              echo "## Parse-normalization probe"
              echo
              echo "Probe skipped: staged schematic or symbol library is missing."
            } > "$probe_root/probe-summary.md"
            exit 0
          fi

          cp "$RUNNER_TEMP/ci/src/$SYM" \
            "$probe_root/original/$SYM"
          cp "$RUNNER_TEMP/ci/src/$SCH" \
            "$probe_root/original/$SCH"
          cp -a "$RUNNER_TEMP/ci/src/." \
            "$probe_root/normalized/"
          rm -rf "$probe_root/normalized/.git"

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/home/kicad \
            -e KICAD_CONFIG_HOME=/home/kicad/.config/kicad \
            -e XDG_CONFIG_HOME=/home/kicad/.config \
            -e XDG_CACHE_HOME=/home/kicad/.cache \
            -e SCH \
            -e SYM \
            -v "$RUNNER_TEMP/ci/home:/home/kicad" \
            -v "$probe_root:/probe" \
            -w /probe/normalized \
            "$KICAD_IMAGE" \
            bash -lc '
              set +e

              {
                echo "=== Baseline ERC before forced rewrite ==="
                kicad-cli sch erc \
                  --format report \
                  --units mm \
                  --severity-all \
                  --output /probe/erc-before-normalization.rpt \
                  "$SCH"
                erc_before_rc=$?
                echo "erc_before_rc=$erc_before_rc"

                echo
                echo "=== Symbol library forced rewrite ==="
                kicad-cli sym upgrade \
                  --force \
                  "$SYM"
                sym_upgrade_rc=$?
                echo "sym_upgrade_rc=$sym_upgrade_rc"

                echo
                echo "=== Schematic forced rewrite ==="
                kicad-cli sch upgrade \
                  --force \
                  "$SCH"
                sch_upgrade_rc=$?
                echo "sch_upgrade_rc=$sch_upgrade_rc"

                echo
                echo "=== ERC after forced rewrite ==="
                if [ "$sym_upgrade_rc" -eq 0 ] && \
                   [ "$sch_upgrade_rc" -eq 0 ]; then
                  kicad-cli sch erc \
                    --format report \
                    --units mm \
                    --severity-all \
                    --output /probe/erc-after-normalization.rpt \
                    "$SCH"
                  erc_after_rc=$?
                else
                  erc_after_rc=99
                  echo "Post-rewrite ERC skipped because an upgrade command failed."
                fi
                echo "erc_after_rc=$erc_after_rc"

                {
                  echo "erc_before_rc=$erc_before_rc"
                  echo "sym_upgrade_rc=$sym_upgrade_rc"
                  echo "sch_upgrade_rc=$sch_upgrade_rc"
                  echo "erc_after_rc=$erc_after_rc"
                } > /probe/probe-status.env
              } > /probe/probe.log 2>&1

              exit 0
            '
          container_rc=$?

          diff -u \
            "$probe_root/original/$SYM" \
            "$probe_root/normalized/$SYM" \
            > "$probe_root/sym-normalization.diff"
          sym_diff_rc=$?

          diff -u \
            "$probe_root/original/$SCH" \
            "$probe_root/normalized/$SCH" \
            > "$probe_root/sch-normalization.diff"
          sch_diff_rc=$?

          extract_context() {
            file="$1"
            pattern="$2"
            output="$3"

            line="$(
              grep -n -m1 -F "$pattern" "$file" \
                | cut -d: -f1
            )"

            if [ -z "$line" ]; then
              echo "Pattern not found: $pattern" > "$output"
              return
            fi

            if [ "$line" -gt 3 ]; then
              start=$((line - 3))
            else
              start=1
            fi

            end=$((line + 110))
            sed -n "${start},${end}p" "$file" > "$output"
          }

          extract_context \
            "$probe_root/original/$SYM" \
            '(symbol "Conn_01x02"' \
            "$probe_root/sym-j1-before.txt"

          extract_context \
            "$probe_root/normalized/$SYM" \
            '(symbol "Conn_01x02"' \
            "$probe_root/sym-j1-after.txt"

          extract_context \
            "$probe_root/original/$SCH" \
            '(symbol "PSU_LED:Conn_01x02"' \
            "$probe_root/sch-j1-before.txt"

          extract_context \
            "$probe_root/normalized/$SCH" \
            '(symbol "PSU_LED:Conn_01x02"' \
            "$probe_root/sch-j1-after.txt"

          diff -u \
            "$probe_root/sym-j1-before.txt" \
            "$probe_root/sym-j1-after.txt" \
            > "$probe_root/sym-j1-normalization.diff"
          sym_j1_diff_rc=$?

          diff -u \
            "$probe_root/sch-j1-before.txt" \
            "$probe_root/sch-j1-after.txt" \
            > "$probe_root/sch-j1-normalization.diff"
          sch_j1_diff_rc=$?

          {
            echo "container_rc=$container_rc"
            echo "sym_diff_rc=$sym_diff_rc"
            echo "sch_diff_rc=$sch_diff_rc"
            echo "sym_j1_diff_rc=$sym_j1_diff_rc"
            echo "sch_j1_diff_rc=$sch_j1_diff_rc"
          } > "$probe_root/probe-host-status.env"

          status_text() {
            case "$1" in
              0) echo "no textual change" ;;
              1) echo "rewritten" ;;
              *) echo "comparison error (rc=$1)" ;;
            esac
          }

          erc_before_rc="not available"
          sym_upgrade_rc="not available"
          sch_upgrade_rc="not available"
          erc_after_rc="not available"

          if [ -s "$probe_root/probe-status.env" ]; then
            # shellcheck disable=SC1090
            . "$probe_root/probe-status.env"
          fi

          {
            echo "## Parse-normalization probe"
            echo
            echo "Diagnostic only. Repository source files were not modified."
            echo
            echo "| Measurement | Result |"
            echo "|---|---|"
            echo "| Probe container | \`rc=$container_rc\` |"
            echo "| Baseline ERC command | \`rc=$erc_before_rc\` |"
            echo "| \`sym upgrade --force\` | \`rc=$sym_upgrade_rc\` |"
            echo "| \`sch upgrade --force\` | \`rc=$sch_upgrade_rc\` |"
            echo "| Post-rewrite ERC command | \`rc=$erc_after_rc\` |"
            echo "| Whole symbol library | $(status_text "$sym_diff_rc") |"
            echo "| Whole schematic | $(status_text "$sch_diff_rc") |"
            echo "| J1 library block | $(status_text "$sym_j1_diff_rc") |"
            echo "| J1 embedded block | $(status_text "$sch_j1_diff_rc") |"

            echo
            echo "### ERC before forced rewrite"
            echo
            echo '```text'
            if [ -s "$probe_root/erc-before-normalization.rpt" ]; then
              cat "$probe_root/erc-before-normalization.rpt"
            else
              echo "Baseline ERC report was not generated."
            fi
            echo '```'

            echo
            echo "### ERC after forced rewrite"
            echo
            echo '```text'
            if [ -s "$probe_root/erc-after-normalization.rpt" ]; then
              cat "$probe_root/erc-after-normalization.rpt"
            else
              echo "Post-rewrite ERC report was not generated."
            fi
            echo '```'

            echo
            echo "<details>"
            echo "<summary>J1 library block rewrite diff</summary>"
            echo
            echo '```diff'
            if [ -s "$probe_root/sym-j1-normalization.diff" ]; then
              cat "$probe_root/sym-j1-normalization.diff"
            else
              echo "No textual change in the extracted J1 library block."
            fi
            echo '```'
            echo "</details>"

            echo
            echo "<details>"
            echo "<summary>J1 embedded block rewrite diff</summary>"
            echo
            echo '```diff'
            if [ -s "$probe_root/sch-j1-normalization.diff" ]; then
              cat "$probe_root/sch-j1-normalization.diff"
            else
              echo "No textual change in the extracted J1 embedded block."
            fi
            echo '```'
            echo "</details>"

            echo
            echo "<details>"
            echo "<summary>Probe command log</summary>"
            echo
            echo '```text'
            if [ -s "$probe_root/probe.log" ]; then
              cat "$probe_root/probe.log"
            else
              echo "Probe log was not generated."
            fi
            echo '```'
            echo "</details>"
          } > "$probe_root/probe-summary.md"

          exit 0

      - name: Publish validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "# KiCad validation"
            echo

            if [ -s "$RUNNER_TEMP/ci/out/kicad-version.txt" ]; then
              echo "**KiCad:** \`$(cat "$RUNNER_TEMP/ci/out/kicad-version.txt")\`"
            else
              echo "**KiCad:** version unavailable"
            fi

            if [ -s "$RUNNER_TEMP/ci/out/exit-status.txt" ]; then
              echo
              echo "**Validation exit code:** \`$(cat "$RUNNER_TEMP/ci/out/exit-status.txt")\`"
            fi

            echo
            echo "## ERC gating report — errors only"
            echo
            echo '```text'
            if [ -s "$RUNNER_TEMP/ci/out/erc.rpt" ]; then
              cat "$RUNNER_TEMP/ci/out/erc.rpt"
            else
              echo "ERC gating report was not generated."
            fi
            echo '```'

            echo
            echo "<details>"
            echo "<summary>Full ERC report — all severities</summary>"
            echo
            echo '```text'
            if [ -s "$RUNNER_TEMP/ci/out/erc-full.rpt" ]; then
              cat "$RUNNER_TEMP/ci/out/erc-full.rpt"
            else
              echo "Full ERC report was not generated."
            fi
            echo '```'
            echo "</details>"

            if [ -s "$RUNNER_TEMP/ci/out/normalization-probe/probe-summary.md" ]; then
              echo
              cat "$RUNNER_TEMP/ci/out/normalization-probe/probe-summary.md"
            fi

            echo
            echo "<details>"
            echo "<summary>Validation log tail</summary>"
            echo
            echo '```text'
            if [ -s "$RUNNER_TEMP/ci/out/run.log" ]; then
              tail -n 50 "$RUNNER_TEMP/ci/out/run.log"
            else
              echo "Validation log was not generated."
            fi
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kicad-validation-${{ github.run_number }}
          path: ${{ runner.temp }}/ci/out
          if-no-files-found: error
          retention-days: 14
