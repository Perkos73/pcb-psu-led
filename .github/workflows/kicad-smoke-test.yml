name: KiCad smoke test

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/kicad-smoke-test.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run KiCad version check
        shell: bash
        run: |
          mkdir -p reports
          chmod 777 reports

          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            kicad/kicad:9.0 \
            kicad-cli version \
            | tee reports/kicad-version.txt

          echo "KiCad cloud check: OK" > reports/SMOKE_TEST_OK.txt

      - name: Save result in repository
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/kicad-version.txt reports/SMOKE_TEST_OK.txt

          if git diff --cached --quiet; then
            echo "No changes to save."
          else
            git commit -m "Save KiCad smoke-test result"
            git push origin HEAD:main
          fi
