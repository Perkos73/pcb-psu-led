name: Harvest Stock Footprints

# Zadanie jednorazowe, uruchamiane recznie. Wyjmuje kandydatow na footprinty
# ze stockowych bibliotek zamrozonego obrazu KiCad i publikuje je jako artefakt.
# Po wybraniu wlasciwych plikow ten workflow zostaje usuniety (wzorzec CI-DIAG-01 -> CI-CLEAN-01).

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  KICAD_IMAGE: ghcr.io/kicad/kicad:10.0-full

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Prepare output dir
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/h"
          mkdir -p "$RUNNER_TEMP/h/out" "$RUNNER_TEMP/h/candidates"

      - name: Harvest
        run: |
          set +e
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/home/kicad \
            -v "$RUNNER_TEMP/h/out:/out" \
            "$KICAD_IMAGE" bash -c '
              set -u
              ver="$(kicad-cli version 2>&1 | tr -d "\r")"
              echo "KiCad: $ver" | tee /out/00_KICAD_VERSION.txt

              ROOT=""
              for d in /usr/share/kicad/footprints /usr/share/kicad/modules; do
                [ -d "$d" ] && ROOT="$d" && break
              done
              if [ -z "$ROOT" ]; then
                echo "STOCK FOOTPRINTS NOT FOUND - is this the -full image?"
                ls -la /usr/share/kicad/ 2>&1
                exit 80
              fi
              echo "root: $ROOT" | tee -a /out/00_KICAD_VERSION.txt
              du -sh "$ROOT" | tee -a /out/00_KICAD_VERSION.txt

              # pelny spis interesujacych bibliotek
              for lib in Fuse Package_TO_SOT_THT Diode_THT Capacitor_THT Resistor_THT \
                         Potentiometer_THT Connector_JST TerminalBlock_Phoenix \
                         Connector_PinHeader_2.54mm Inductor_THT; do
                if [ -d "$ROOT/$lib.pretty" ]; then
                  ls "$ROOT/$lib.pretty" | sed "s/\.kicad_mod$//" > "/out/01_list_$lib.txt"
                  echo "$lib: $(wc -l < /out/01_list_$lib.txt) footprintow"
                else
                  echo "$lib: BRAK BIBLIOTEKI"
                fi
              done | tee /out/02_summary.txt

              # kandydaci wg wzorcow
              mkdir -p /out/candidates
              copy() {
                lib="$1"; pat="$2"
                [ -d "$ROOT/$lib.pretty" ] || return 0
                find "$ROOT/$lib.pretty" -maxdepth 1 -iname "$pat.kicad_mod" -exec cp {} /out/candidates/ \; 2>/dev/null
              }
              copy Fuse                "*Fuseholder*5x20*"
              copy Fuse                "*Clip*5x20*"
              copy Package_TO_SOT_THT  "TO-92*"
              copy Diode_THT           "D_DO-15*"
              copy Diode_THT           "D_DO-41*"
              copy Diode_THT           "D_A-405*"
              copy Capacitor_THT       "CP_Radial_D5.0mm_P2.50mm*"
              copy Capacitor_THT       "CP_Radial_D6.3mm_P2.50mm*"
              copy Capacitor_THT       "CP_Radial_D8.0mm_P3.50mm*"
              copy Capacitor_THT       "C_Disc_D5*P5.00mm*"
              copy Capacitor_THT       "C_Disc_D6*P5.00mm*"
              copy Capacitor_THT       "C_Rect*P5.00mm*"
              copy Resistor_THT        "R_Axial_DIN0207*"
              copy Resistor_THT        "R_Axial_DIN0309*"
              copy Resistor_THT        "R_Axial_DIN0411*"
              copy Potentiometer_THT   "*3296*"
              copy Connector_JST       "JST_XH_B2B-XH-A*"
              copy Connector_JST       "JST_XH_S2B-XH-A*"
              copy TerminalBlock_Phoenix "*10.16mm*"
              copy TerminalBlock_Phoenix "*MPT*"

              echo "--- kandydatow: $(ls /out/candidates | wc -l)"
              ls -l /out/candidates | tee /out/03_candidates.txt
            ' 2>&1 | tee "$RUNNER_TEMP/h/out/99_run.log"
          status=${PIPESTATUS[0]}
          set -e
          case "$status" in
            0)   echo "OK" ;;
            80)  echo "::error::Stock footprint tree not found in image" ;;
            125) echo "::error::Docker could not start container" ;;
            *)   echo "::error::Unexpected exit $status" ;;
          esac
          exit "$status"

      - name: Upload harvest
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stock-footprints-harvest
          path: ${{ runner.temp }}/h/out
          if-no-files-found: error
          retention-days: 7
