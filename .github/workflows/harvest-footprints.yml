name: Harvest Stock Footprints

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  KICAD_IMAGE: ghcr.io/kicad/kicad:10.0-full

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harvest names to log
        run: |
          set +e
          docker run --rm "$KICAD_IMAGE" bash -c '
            set -u
            echo "=== KICAD ==="
            kicad-cli version 2>&1 | tr -d "\r"

            ROOT=""
            for d in /usr/share/kicad/footprints /usr/share/kicad/modules; do
              [ -d "$d" ] && ROOT="$d" && break
            done
            if [ -z "$ROOT" ]; then
              echo "STOCK FOOTPRINTS NOT FOUND"; ls -la /usr/share/kicad/ 2>&1; exit 80
            fi
            echo "root: $ROOT"

            m() {
              echo ""
              echo "=== $1 ==="
              lib="$2"; shift 2
              if [ ! -d "$ROOT/$lib.pretty" ]; then echo "BRAK BIBLIOTEKI $lib"; return 0; fi
              for pat in "$@"; do
                find "$ROOT/$lib.pretty" -maxdepth 1 -iname "$pat.kicad_mod" -printf "%f\n" 2>/dev/null
              done | sed "s/\.kicad_mod$//" | sort -u
            }

            m "F1 bezpiecznik 5x20"  Fuse "*5x20*"
            m "U1 TO-92"             Package_TO_SOT_THT "TO-92*"
            m "D1 D2 dioda osiowa"   Diode_THT "D_DO-15*" "D_DO-41*" "D_A-405*"
            m "C1 elektrolit"        Capacitor_THT "CP_Radial_D5.0mm_P2.50mm*" "CP_Radial_D6.3mm_P2.50mm*" "CP_Radial_D8.0mm_P3.50mm*"
            m "C2 C3 ceramika P5"    Capacitor_THT "C_Disc_D5*P5.00mm*" "C_Disc_D6*P5.00mm*" "C_Rect*P5.00mm*"
            m "R1 rezystor osiowy"   Resistor_THT "R_Axial_DIN0207*" "R_Axial_DIN0309*" "R_Axial_DIN0411*"
            m "RV1 Bourns 3296"      Potentiometer_THT "*3296*"
            m "J2 JST XH"            Connector_JST "*XH*2B-XH-A*"
            m "J1 Phoenix 10.16"     TerminalBlock_Phoenix "*10.16mm*2*"
            echo ""
            echo "=== KONIEC ==="
          '
          status=$?
          set -e
          case "$status" in
            0)   echo "OK" ;;
            80)  echo "::error::Stock footprint tree not found in image" ;;
            125) echo "::error::Docker could not start container" ;;
            *)   echo "::error::Unexpected exit $status" ;;
          esac
          exit "$status"
