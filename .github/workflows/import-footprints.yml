name: Import Stock Footprints

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  KICAD_IMAGE: ghcr.io/kicad/kicad:10.0-full

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Copy chosen footprints out of the frozen image
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/fp"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$RUNNER_TEMP/fp:/out" \
            "$KICAD_IMAGE" bash -c '
              set -eu
              R=/usr/share/kicad/footprints
              g() { cp "$R/$1.pretty/$2.kicad_mod" /out/ && echo "OK  $2"; }
              g Potentiometer_THT  Potentiometer_Bourns_3296W_Vertical
              g Package_TO_SOT_THT TO-92_Inline
              g Capacitor_THT      CP_Radial_D6.3mm_P2.50mm
              g Capacitor_THT      C_Disc_D5.0mm_W2.5mm_P5.00mm
              g Diode_THT          D_DO-15_P12.70mm_Horizontal
              g Resistor_THT       R_Axial_DIN0309_L9.0mm_D3.2mm_P12.70mm_Horizontal
              g Connector_JST      JST_XH_S2B-XH-A_1x02_P2.50mm_Horizontal
              g Fuse               Fuseholder_Cylinder-5x20mm_Schurter_FUP_0031.2510_Horizontal_Closed
              echo ""
              echo "=== PELNA LISTA TerminalBlock_Phoenix ==="
              ls "$R/TerminalBlock_Phoenix.pretty" | sed "s/\.kicad_mod$//" | sort
              echo "=== KONIEC ==="
            '
          ls -l "$RUNNER_TEMP/fp"

      - name: Commit into project library
        run: |
          set -euo pipefail
          cp "$RUNNER_TEMP/fp"/*.kicad_mod PSU_LED.pretty/
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PSU_LED.pretty/
          if git diff --cached --quiet; then
            echo "Nic nowego"; exit 0
          fi
          git commit -m "ECAD-17: import stock footprints into project library"
          git push