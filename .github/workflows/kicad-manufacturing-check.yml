name: KiCad manufacturing check

on:
  workflow_dispatch:
  push:
    paths:
      - '**.kicad_sch'
      - '**.kicad_pcb'
      - '**.kicad_pro'
      - '**.kicad_sym'
      - '**.kicad_mod'
      - 'fp-lib-table'
      - 'sym-lib-table'
      - '.github/workflows/kicad-manufacturing-check.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Inspect environment and project files
        shell: bash
        run: |
          {
            echo "PWD: $PWD"
            echo
            echo "Repository files:"
            find . -maxdepth 3 -type f -print | sort
            echo
            echo "Docker version:"
            docker --version
            echo
            echo "KiCad version:"
            docker run --rm \
              -v "$GITHUB_WORKSPACE:/work" \
              -w /work \
              kicad/kicad:9.0 \
              kicad-cli version
          } 2>&1 | tee reports/environment.log

      - name: Run ERC
        id: erc
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            kicad/kicad:9.0 \
            kicad-cli sch erc \
              --severity-all \
              --exit-code-violations \
              --output reports/erc.rpt \
              pcb-psu-led.kicad_sch \
            > reports/erc-console.log 2>&1

          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          echo "exit_code=$rc" >> reports/erc-console.log

          if [ ! -f reports/erc.rpt ]; then
            echo "KiCad did not create erc.rpt. See erc-console.log." > reports/erc.rpt
          fi

          cat reports/erc-console.log
          exit 0

      - name: Run DRC and schematic parity check
        id: drc
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            kicad/kicad:9.0 \
            kicad-cli pcb drc \
              --severity-all \
              --exit-code-violations \
              --schematic-parity \
              --output reports/drc.rpt \
              pcb-psu-led.kicad_pcb \
            > reports/drc-console.log 2>&1

          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          echo "exit_code=$rc" >> reports/drc-console.log

          if [ ! -f reports/drc.rpt ]; then
            echo "KiCad did not create drc.rpt. See drc-console.log." > reports/drc.rpt
          fi

          cat reports/drc-console.log
          exit 0
          
      - name: Show reports in GitHub log
        if: always()
        shell: bash
        run: |
          echo "================ ERC REPORT ================"
          cat reports/erc.rpt 2>/dev/null || true
          echo
          echo "================ DRC REPORT ================"
          cat reports/drc.rpt 2>/dev/null || true
          echo
          echo "============= ERC CONSOLE LOG =============="
          cat reports/erc-console.log 2>/dev/null || true
          echo
          echo "============= DRC CONSOLE LOG =============="
          cat reports/drc-console.log 2>/dev/null || true
          
      - name: Upload ERC and DRC reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pcb-psu-led-check-reports
          path: reports
          if-no-files-found: error
          retention-days: 14

      - name: Fail when ERC or DRC failed or found violations
        if: always()
        shell: bash
        run: |
          echo "ERC exit code: ${{ steps.erc.outputs.rc }}"
          echo "DRC exit code: ${{ steps.drc.outputs.rc }}"

          if [ "${{ steps.erc.outputs.rc }}" != "0" ] || \
             [ "${{ steps.drc.outputs.rc }}" != "0" ]; then
            echo "ERC or DRC failed or found violations."
            echo "Download artifact: pcb-psu-led-check-reports"
            exit 1
          fi
