name: KiCad manufacturing check

on:
  workflow_dispatch:
  push:
    paths:
      - '**.kicad_sch'
      - '**.kicad_pcb'
      - '**.kicad_pro'
      - '**.kicad_sym'
      - '**.kicad_mod'
      - 'fp-lib-table'
      - 'sym-lib-table'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Inspect environment and project files
        shell: bash
        run: |
          {
            echo "PWD: $PWD"
            echo
            echo "Repository files:"
            find . -maxdepth 3 -type f -print | sort
            echo
            echo "Docker version:"
            docker --version
            echo
            echo "KiCad version:"
            docker run --rm \
              -v "$GITHUB_WORKSPACE:/work" \
              -w /work \
              kicad/kicad:9.0 \
              kicad-cli version
          } 2>&1 | tee reports/environment.log

      - name: Run ERC
        id: erc
        shell: bash
        run: |
          set +e
          # Sprawdzamy czy schemat w ogóle istnieje przed testem
          if [ -f "pcb-psu-led.kicad_sch" ]; then
            docker run --rm \
              -v "$GITHUB_WORKSPACE:/work" \
              -w /work \
              kicad/kicad:9.0 \
              kicad-cli sch erc \
                --severity-all \
                --exit-code-violations \
                --output reports/erc.rpt \
                pcb-psu-led.kicad_sch \
              > reports/erc-console.log 2>&1
            rc=$?
          else
            echo "Brak pliku schematu pcb-psu-led.kicad_sch!" > reports/erc-console.log
            rc=1
          fi
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          echo "exit_code=$rc" >> reports/erc-console.log
          exit 0

      - name: Run DRC and schematic parity check
        id: drc
        shell: bash
        run: |
          set +e
          # Zapobiegamy wywaleniu się jeśli nie ma jeszcze pliku pcb
          if [ -f "pcb-psu-led.kicad_pcb" ]; then
            docker run --rm \
              -v "$GITHUB_WORKSPACE:/work" \
              -w /work \
              kicad/kicad:9.0 \
              kicad-cli pcb drc \
                --severity-all \
                --exit-code-violations \
                --schematic-parity \
                --output reports/drc.rpt \
                pcb-psu-led.kicad_pcb \
              > reports/drc-console.log 2>&1
            rc=$?
          else
            echo "Brak pliku płytki pcb-psu-led.kicad_pcb! Pomijam test DRC." > reports/drc-console.log
            rc=0
          fi
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          echo "exit_code=$rc" >> reports/drc-console.log
          exit 0

      - name: Upload ERC and DRC reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pcb-psu-led-check-reports
          path: reports
          if-no-files-found: error
          retention-days: 14
