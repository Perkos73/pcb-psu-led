name: KiCad manufacturing check

on:
  workflow_dispatch:
  push:
    paths:
      - '**.kicad_sch'
      - '**.kicad_pcb'
      - '**.kicad_pro'
      - '**.kicad_sym'
      - '**.kicad_mod'
      - 'fp-lib-table'
      - 'sym-lib-table'
      - '.github/workflows/kicad-manufacturing-check.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    container:
      image: kicad/kicad:9.0

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Run ERC
        id: erc
        continue-on-error: true
        run: >-
          kicad-cli sch erc
          --severity-all
          --exit-code-violations
          --output reports/erc.rpt
          pcb-psu-led.kicad_sch

      - name: Run DRC and schematic parity check
        id: drc
        continue-on-error: true
        run: >-
          kicad-cli pcb drc
          --severity-all
          --exit-code-violations
          --schematic-parity
          --output reports/drc.rpt
          pcb-psu-led.kicad_pcb

      - name: Upload ERC and DRC reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pcb-psu-led-check-reports
          path: reports/
          if-no-files-found: error

      - name: Fail when ERC or DRC found violations
        if: steps.erc.outcome == 'failure' || steps.drc.outcome == 'failure'
        run: |
          echo "ERC or DRC reported violations. Download the report artifact."
          exit 1
