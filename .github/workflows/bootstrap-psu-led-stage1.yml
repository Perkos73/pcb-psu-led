PAYLOAD
          base64 -d /tmp/pcb_psu_led_stage1.b64 > /tmp/pcb_psu_led_stage1.tar.gz
          tar -xzf /tmp/pcb_psu_led_stage1.tar.gz -C .
          mkdir -p reports
          chmod 777 reports

      - name: Run ERC with KiCad 9
        id: erc
        shell: bash
        run: |
          set +e
          docker run --rm             --user "$(id -u):$(id -g)"             -v "$GITHUB_WORKSPACE:/work"             -w /work             kicad/kicad:9.0             kicad-cli sch erc               --severity-all               --exit-code-violations               --output reports/erc.rpt               pcb-psu-led.kicad_sch               > reports/erc-console.log 2>&1
          rc=$?
          echo "code=$rc" >> "$GITHUB_OUTPUT"
          echo "exit_code=$rc" >> reports/erc-console.log
          if [ ! -f reports/erc.rpt ]; then
            {
              echo "ERC REPORT WAS NOT CREATED"
              echo
              cat reports/erc-console.log
            } > reports/erc.rpt
          fi
          cat reports/erc-console.log
          exit 0

      - name: Save project and ERC report in repository
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add             pcb-psu-led.kicad_pro             pcb-psu-led.kicad_sch             symbols.kicad_sym             sym-lib-table             fp-lib-table             footprints.pretty/Talema_70000K.kicad_mod             reports/erc.rpt             reports/erc-console.log
          if git diff --cached --quiet; then
            echo "No changes to save."
          else
            git commit -m "Add PCB PSU LED stage-1 schematic and ERC report"
            git push origin HEAD:main
          fi

      - name: Show ERC result
        if: always()
        shell: bash
        run: |
          echo "================ ERC REPORT ================"
          cat reports/erc.rpt 2>/dev/null || true
          echo
          echo "================ ERC CONSOLE ==============="
          cat reports/erc-console.log 2>/dev/null || true
          echo
          echo "ERC exit code: ${{ steps.erc.outputs.code }}"

      - name: Mark ERC violations
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.erc.outputs.code }}" != "0" ]; then
            echo "ERC found violations. The report is saved in reports/erc.rpt."
            exit 1
          fi
