name: KiCad smoke test

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/kicad-smoke-test.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run KiCad 9.0.9 smoke test
        shell: bash
        run: |
          set -e
          mkdir -p reports
          chmod 777 reports

          docker run --rm             -v "$GITHUB_WORKSPACE:/work"             -w /work             kicad/kicad:9.0             kicad-cli version             | tee reports/kicad-version.txt

          {
            echo "KIcad cloud check: OK"
            echo "Runner: ubuntu-latest"
            echo "Docker: $(docker --version)"
            echo "Timestamp UTC: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > reports/SMOKE_TEST_OK.txt

      - name: Save visible result in repository
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/SMOKE_TEST_OK.txt reports/kicad-version.txt

          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "KiCad cloud smoke test result"
            git push origin HEAD:main
          fi
